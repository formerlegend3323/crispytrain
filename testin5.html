<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drag & Drop HTML Loader (Unity/WebGL safe)</title>

<style>
body{
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.container{
    text-align:center;
    border:2px dashed #007BFF;
    padding:20px;
}
</style>
</head>
<body>

<div class="container">
    <p>Drag & Drop HTML File Here</p>
    <input type="file" id="fileInput" accept=".html">
    <br><br>
    <button id="openBtn">Load</button>
</div>

<script>
(function () {

const fileInput = document.getElementById("fileInput");
const openBtn   = document.getElementById("openBtn");

let htmlText = "";

fileInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
        htmlText = ev.target.result;
    };
    reader.readAsText(file);
});

openBtn.addEventListener("click", () => {

    if (!htmlText) {
        alert("Pick a file first.");
        return;
    }


    const self = document.currentScript;
    if (self) self.remove();

    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlText, "text/html");

    const html = window.document;

    
    html.documentElement.innerHTML = doc.documentElement.innerHTML;


    doc.querySelectorAll("script").forEach(s => {

        const ns = html.createElement("script");

        for (const a of s.attributes) {
            ns.setAttribute(a.name, a.value);
        }

        const rawSrc = s.getAttribute("src");

        if (rawSrc) {
            ns.src = rawSrc;
        } else {
            ns.textContent = s.textContent;
        }

        html.body.appendChild(ns);
    });

});

})();
</script>

</body>
</html>
