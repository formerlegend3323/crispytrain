<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drag and Drop HTML Loader (script reinject)</title>
<style>
body {
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.container {
    border:2px dashed #007BFF;
    padding:20px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container" id="drop-zone">
    <p>Drag & Drop HTML File Here</p>
    <input type="file" id="fileInput" accept=".html">
    <br><br>
    <button id="openBtn">Load into this tab</button>
</div>

<script>
const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("fileInput");
const openBtn   = document.getElementById("openBtn");

let htmlText = "";

dropZone.addEventListener("dragover", e => {
    e.preventDefault();
});

dropZone.addEventListener("drop", e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
});

fileInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (file) readFile(file);
});

function readFile(file) {
    const r = new FileReader();
    r.onload = e => htmlText = e.target.result;
    r.readAsText(file);
}


openBtn.addEventListener("click", async () => {
    if (!htmlText) {
        alert("Load a file first.");
        return;
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlText, "text/html");

    const html = window.document;

    html.documentElement.innerHTML = doc.documentElement.innerHTML;


    const scripts = Array.from(doc.querySelectorAll("script"));

    for (const s of scripts) {
        const ns = html.createElement("script");

        for (const attr of s.attributes) {
            ns.setAttribute(attr.name, attr.value);
        }

        if (s.src) {
            ns.src = s.src;
        } else {
            ns.textContent = s.textContent;
        }

        html.body.appendChild(ns);
    }
});
</script>

</body>
</html>
