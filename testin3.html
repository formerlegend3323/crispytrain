<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HTML Loader (Unity/WebGL safe)</title>
<style>
body{
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  border:2px dashed #007BFF;
  padding:20px;
}
</style>
</head>
<body>

<div class="box">
  <input type="file" id="fileInput" accept=".html">
  <br><br>
  <button id="openBtn">Load</button>
</div>

<script>
(() => {

const fileInput = document.getElementById("fileInput");
const openBtn   = document.getElementById("openBtn");

let htmlText = "";

fileInput.addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => htmlText = ev.target.result;
  r.readAsText(f);
});

openBtn.addEventListener("click", () => {
  if (!htmlText) {
    alert("Pick a file first.");
    return;
  }

  const parser = new DOMParser();
  const parsed = parser.parseFromString(htmlText, "text/html");

  const scripts = Array.from(parsed.querySelectorAll("script"));
  scripts.forEach(s => s.remove());


  document.documentElement.innerHTML =
    parsed.documentElement.innerHTML;


  for (const s of scripts) {
    const ns = document.createElement("script");

    for (const a of s.attributes) {
      if (a.name !== "src") ns.setAttribute(a.name, a.value);
    }

    const rawSrc = s.getAttribute("src");
    if (rawSrc) ns.src = rawSrc;
    else ns.textContent = s.textContent;

    document.body.appendChild(ns);
  }

})();

</script>

</body>
</html>
